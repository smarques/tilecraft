<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium 8x8 sliding tile puzzle game.">
    <title>Tilecraft - Sliding Puzzle</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <div class="stats-container" data-html2canvas-ignore="true">
            <div class="moves-display">Moves: <span id="moves-count">0</span></div>
            <div class="game-title">Tilecraft</div>
            <div class="score-display">Score: <span id="score-count">0</span></div>
        </div>
        <header>
            <h1 id="player-name-display"></h1>
            <p data-html2canvas-ignore="true">Slide the words to solve the cosmos</p>
            <div class="controls" data-html2canvas-ignore="true">
                <button id="shuffle-btn">Shuffle</button>
                <button id="mode-move" class="active">Move</button>
                <button id="mode-highlight">Highlight</button>
                <button id="save-btn">Save</button>

            </div>
        </header>

        <main>
            <div id="game-board" class="game-board">
                <!-- Tiles will be injected here by JS -->
            </div>
            <div id="saved-comment-display" class="saved-comment hidden"></div>
        </main>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Welcome to Tilecraft</h2>
            <p>Please enter your name to begin discovering the cosmos.</p>
            <input type="text" id="player-name-input" placeholder="Your Name" autocomplete="off" spellcheck="false" />
            <button id="start-game-btn">Start Game</button>
        </div>
    </div>

    <div id="save-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Save Game</h2>
            <p>Please enter a comment to save.</p>
            <textarea id="save-comment" placeholder="Enter your comment here..." rows="8"></textarea>
            <div id="word-count-indicator">Word count: 0/30</div>
            <div class="modal-actions">
                <button id="save-cancel-btn">Cancel</button>
                <button id="save-confirm-btn" disabled>Confirm</button>
            </div>
        </div>
    </div>

    <div id="dialog-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="dialog-title">Notice</h2>
            <p id="dialog-message"></p>
            <div class="modal-actions" style="margin-top: 1.5rem;">
                <button id="dialog-ok-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
